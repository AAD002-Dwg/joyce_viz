<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joyce Project — Visualization 2.0</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <header>
    <h1>The Joyce Project &mdash; <span id="chapterTitle">Telemachus</span> &nbsp;/&nbsp; Annotations</h1>
    <select id="chapterSelect">
      <option value="1">1. Telemachus</option>
      <option value="2">2. Nestor</option>
      <option value="3">3. Proteus</option>
      <option value="4">4. Calypso</option>
      <option value="5">5. Lotus Eaters</option>
      <option value="6">6. Hades</option>
      <option value="7">7. Aeolus</option>
      <option value="8">8. Lestrygonians</option>
      <option value="9">9. Scylla and Charybdis</option>
      <option value="10">10. Wandering Rocks</option>
      <option value="11">11. Sirens</option>
      <option value="12">12. Cyclops</option>
      <option value="13">13. Nausicaa</option>
      <option value="14">14. Oxen of the Sun</option>
      <option value="15">15. Circe</option>
      <option value="16">16. Eumaeus</option>
      <option value="17">17. Ithaca</option>
      <option value="18">18. Penelope</option>
    </select>
    <div class="legend" id="legend"></div>
    <div class="controls">
      <button class="btn active" id="btnNetwork">Network</button>
      <button class="btn" id="btnTimeline">Timeline</button>
      <div class="ctrl-sep"></div>
      <label class="ctrl-label">
        <input type="checkbox" id="showLabels" checked> Labels
      </label>
    </div>
  </header>

  <div id="main">
    <div id="graph-container">
        <svg id="graph"></svg>
        <div id="tooltip"></div>
        <div id="info">Loading chapter...</div>
    </div>
    
    <!-- Stats Panel -->
    <div id="stats-container" class="stats-panel"></div>

    <!-- Architectural Concept Module -->
    <div id="arch-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
